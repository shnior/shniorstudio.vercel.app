<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ניהול מערכת - הכספת</title>
    <script>
        const password = prompt("הכנס סיסמה לניהול:");
        if (password !== "8425") { // שנה לסיסמה שלך
            alert("גישה נדחתה");
            window.location.href = "index.html";
        }
    </script>
    <style>
        /* עיצוב בסיסי לניהול */
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .admin-card { background: #2a2a2a; padding: 20px; border-radius: 8px; max-width: 500px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: none; }
        button { background: #8b0000; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; width: 100%; }
        button:hover { background: #a00000; }
    </style>
</head>
<body>
    
<div class="admin-card">
    <h3>עיצוב האתר</h3>
    <label>צבע דגש (Accent Color):</label>
    <input type="color" id="colorInput" value="#8b0000">
    <button id="saveColorBtn">עדכן צבע</button>
</div>

<div class="admin-card">
    <h3>תוכן דף הבית</h3>
    <input type="text" id="welcomeTextInput" placeholder="טקסט ברוכים הבאים">
    <button id="saveTextBtn">עדכן טקסט</button>
</div>
    <h1>מרכז שליטה</h1>

    <div class="admin-card">
        <h3>עדכון שם האתר</h3>
        <input type="text" id="siteNameInput" placeholder="הכנס שם אתר חדש">
        <button id="saveNameBtn">עדכן שם</button>
    </div>

    <div class="admin-card">
        <h3>הוספת קליפ חדש</h3>
        <input type="text" id="clipTitleInput" placeholder="שם הקליפ">
        <input type="text" id="clipUrlInput" placeholder="מזהה יוטיוב (למשל: dQw4w9WgXcQ)">
        <button id="addClipBtn">הוסף קליפ לרשימה</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
            authDomain: "shnior-studio.firebaseapp.com",
            databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shnior-studio",
            storageBucket: "shnior-studio.firebasestorage.app",
            messagingSenderId: "163064507259",
            appId: "1:163064507259:web:3fb46c6795eba5b84f6bde"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. פונקציה לעדכון שם האתר
        document.getElementById('saveNameBtn').onclick = function() {
            const newName = document.getElementById('siteNameInput').value;
            if (newName) {
                set(ref(db, 'settings/site_name'), newName)
                    .then(() => alert("השם עודכן ב-Firebase!"))
                    .catch((e) => alert("שגיאה: " + e.message));
            }
        };
// עדכון צבע
document.getElementById('saveColorBtn').onclick = function() {
    const newColor = document.getElementById('colorInput').value;
    set(ref(db, 'settings/accent_color'), newColor)
        .then(() => alert("הצבע עודכן!"));
};

// עדכון טקסט ברוכים הבאים
document.getElementById('saveTextBtn').onclick = function() {
    const newText = document.getElementById('welcomeTextInput').value;
    set(ref(db, 'settings/welcome_message'), newText)
        .then(() => alert("הטקסט עודכן!"));
};
        // 2. פונקציה להוספת קליפ חדש לרשימה
        document.getElementById('addClipBtn').onclick = function() {
            const title = document.getElementById('clipTitleInput').value;
            const ytid = document.getElementById('clipUrlInput').value;
            
            if (title && ytid) {
                const clipsRef = ref(db, 'clips');
                const newClipRef = push(clipsRef); // יוצר מזהה ייחודי חדש אוטומטית
                set(newClipRef, {
                    title: title,
                    youtube_id: ytid
                }).then(() => {
                    alert("הקליפ נוסף בהצלחה!");
                    document.getElementById('clipTitleInput').value = "";
                    document.getElementById('clipUrlInput').value = "";
                });
            }
        };
    </script>
</body>
</html>
