<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מנהל תוכן - שניאור אייזנבך</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: 'Heebo', sans-serif; background: #0f0a0c; color: #f4f4f4; padding: 30px; }
    h1 { color: #D4AF37; }
    input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #1f1518; border: 1px solid #7a1528; color: white; border-radius: 8px; }
    button { background: #7a1528; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
    button:hover { background: #D4AF37; color: black; }
    .success { color: #4CAF50; }
  </style>
  
  <!-- Vercel Speed Insights -->
  <script type="module">
    import { injectSpeedInsights } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@2.0.0/dist/index.mjs';
    injectSpeedInsights();
  </script>
</head>
<body>
  <h1>🛠 מנהל תוכן - שניאור אייזנבך</h1>
  
  <div id="form">
    <label>לוגו (טקסט):</label>
    <input type="text" id="logoText" placeholder="שניאור אייזנבך">

    <label>כותרת ראשית (Hero):</label>
    <input type="text" id="heroTitle" placeholder="הסאונד. הוויזואל. ההפקה.">

    <label>תיאור ראשי:</label>
    <textarea id="heroSubtitle" rows="3">קלידן, מפיק מוזיקלי, עורך וידאו ואנימטור</textarea>

    <button onclick="saveContent()">💾 שמור שינויים</button>
  </div>

  <p id="status"></p>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
      authDomain: "shnior-studio.firebaseapp.com",
      projectId: "shnior-studio",
      storageBucket: "shnior-studio.firebasestorage.app",
      messagingSenderId: "163064507259",
      appId: "1:163064507259:web:3fb46c6795eba5b84f6bde"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // טעינת הנתונים הקיימים
    async function loadCurrentContent() {
      try {
        const doc = await db.collection("general").doc("main").get();
        if (doc.exists) {
          const d = doc.data();
          document.getElementById("logoText").value = d.logoText || "";
          document.getElementById("heroTitle").value = d.heroTitle || "";
          document.getElementById("heroSubtitle").value = d.heroSubtitle || "";
        }
      } catch(e) {}
    }

    // שמירת הנתונים
    async function saveContent() {
      const status = document.getElementById("status");
      status.textContent = "שומר...";

      try {
        await db.collection("general").doc("main").set({
          logoText: document.getElementById("logoText").value,
          heroTitle: document.getElementById("heroTitle").value,
          heroSubtitle: document.getElementById("heroSubtitle").value,
          lastUpdated: new Date()
        }, { merge: true });

        status.innerHTML = '<span class="success">✅ השינויים נשמרו בהצלחה!</span>';
      } catch (error) {
        status.textContent = "❌ שגיאה: " + error.message;
      }
    }

    // טען נתונים כשנכנסים למנהל
    window.onload = loadCurrentContent;
  </script>
</body>
</html>
