<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מנהל תוכן - שניאור אייזנבך</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: 'Heebo', Arial, sans-serif; background: #0a0507; color: #f4f4f4; padding: 30px; max-width: 800px; margin: 0 auto; }
    h1 { color: #D4AF37; text-align: center; }
    label { display: block; margin: 15px 0 5px; font-weight: bold; color: #D4AF37; }
    input, textarea { width: 100%; padding: 14px; background: #1a0f12; border: 1px solid #7a1528; color: white; border-radius: 8px; font-size: 1.05rem; }
    button { background: #7a1528; color: white; padding: 16px 40px; font-size: 1.2rem; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
    button:hover { background: #D4AF37; color: black; }
    #status { margin-top: 20px; font-size: 1.1rem; text-align: center; min-height: 30px; }
    .success { color: #4CAF50; }
    .error { color: #ff4444; }
  </style>
</head>
<body>
  <h1>🛠 מנהל תוכן - שניאור אייזנבך</h1>

  <label>לוגו (טקסט):</label>
  <input type="text" id="logoText">

  <label>כותרת ראשית (Hero):</label>
  <input type="text" id="heroTitle">

  <label>תיאור ראשי (Hero):</label>
  <textarea id="heroSubtitle" rows="4"></textarea>

  <button onclick="saveContent()">💾 שמור שינויים</button>

  <div id="status"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
      authDomain: "shnior-studio.firebaseapp.com",
      projectId: "shnior-studio",
      storageBucket: "shnior-studio.firebasestorage.app",
      messagingSenderId: "163064507259",
      appId: "1:163064507259:web:3fb46c6795eba5b84f6bde"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // טעינת נתונים קיימים
    async function loadContent() {
      try {
        const doc = await db.collection("general").doc("main").get();
        if (doc.exists) {
          const d = doc.data();
          document.getElementById("logoText").value = d.logoText || "שניאור אייזנבך";
          document.getElementById("heroTitle").value = d.heroTitle || "הסאונד. הוויזואל. ההפקה.";
          document.getElementById("heroSubtitle").value = d.heroSubtitle || "קלידן, מפיק מוזיקלי, עורך וידאו ואנימטור";
        }
      } catch (e) {
        console.error(e);
      }
    }

    // שמירה עם דיבאג
    async function saveContent() {
      const status = document.getElementById("status");
      status.textContent = "שומר...";
      status.className = "";

      const data = {
        logoText: document.getElementById("logoText").value,
        heroTitle: document.getElementById("heroTitle").value,
        heroSubtitle: document.getElementById("heroSubtitle").value,
        lastUpdated: new Date().toISOString()
      };

      console.log("📤 מנסה לשמור:", data);

      try {
        await db.collection("general").doc("main").set(data, { merge: true });
        
        console.log("✅ שמירה הצליחה!");
        status.innerHTML = '<span class="success">✅ השינויים נשמרו בהצלחה!</span>';
        
        // רענון האתר הראשי אחרי שמירה
        setTimeout(() => {
          if (confirm("השינויים נשמרו. לרענן את האתר הראשי?")) {
            window.opener?.location.reload();
          }
        }, 800);

      } catch (error) {
        console.error("❌ שגיאת שמירה:", error);
        status.innerHTML = `<span class="error">❌ שגיאה: ${error.message}</span>`;
      }
    }

    window.onload = loadContent;
  </script>
</body>
</html>
