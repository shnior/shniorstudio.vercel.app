<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול תוכן | Shneior Eisenbach</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #D4AF37;
            --primary-dark: #b8952e;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --input-bg: #2a2a2a;
            --border: #333;
        }

        body { font-family: 'Google Sans', sans-serif; background: var(--bg-dark); color: var(--text-main); padding: 40px 20px; line-height: 1.6; margin: 0; direction: rtl; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: var(--primary); text-align: center; font-size: 2.5rem; margin-bottom: 40px; }

        .section { background: var(--card-bg); padding: 30px; border-radius: 16px; margin-bottom: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .section-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .section-header h2 { margin: 0; font-size: 1.5rem; color: var(--primary); }

        label { display: block; margin: 15px 0 8px; font-weight: 500; color: var(--text-muted); font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px 15px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 8px; font-family: inherit; box-sizing: border-box; font-size: 1rem; }
        input:focus, textarea:focus { outline: 1px solid var(--primary); border-color: var(--primary); }
        
        .btn { background: var(--primary); color: #000; padding: 12px 25px; font-size: 1rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; }
        .btn:hover { background: var(--primary-dark); transform: translateY(-2px); }

        /* עיצוב קומפקטי לפריט תיק עבודות */
        .portfolio-item { 
            border: 1px solid var(--border); 
            padding: 12px 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            background: #252525; 
            transition: transform 0.2s;
        }

        .portfolio-item label { margin: 0 0 5px 0; font-size: 0.8rem; }
        .portfolio-item input { padding: 8px 10px; font-size: 0.9rem; }

        .item-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
        .btn-move { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border); padding: 6px 12px; cursor: pointer; border-radius: 8px; transition: 0.3s; font-size: 0.85rem; }
        .btn-move:hover:not(:disabled) { background: var(--primary); color: #000; }
        .btn-move:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-delete { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d; padding: 6px 12px; font-size: 0.85rem; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-delete:hover { background: #ff4d4d; color: white; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #4CAF50; color: white; padding: 12px 30px; border-radius: 50px; display: none; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; }
    </style>
    
    <!-- Vercel Speed Insights -->
    <script type="module">
        import { injectSpeedInsights } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@2.0.0/dist/index.mjs';
        injectSpeedInsights();
    </script>
</head>
<body>

<div id="loader" class="loading-overlay">שומר נתונים...</div>

<div class="container">
    <h1>🛠 מנהל תוכן מקצועי</h1>

    <div class="section">
        <div class="section-header">
            <h2><i class="fas fa-id-card"></i> מיתוג ולוגו</h2>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label>טקסט לוגו (השם שלך)</label>
                <input type="text" id="logoText" placeholder="לדוגמה: Shneior Eisenbach">
            </div>
            <div>
                <label>החלפת לוגו (תמונה עד 400KB)</label>
                <input type="file" id="logoFile" accept="image/*">
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <h2><i class="fas fa-home"></i> מסך ראשי (Hero)</h2>
        </div>
        <label>כותרת ראשית</label>
        <input type="text" id="heroTitle" placeholder="לדוגמה: עריכת וידאו ברמה אחרת">
        <label>תיאור תת-כותרת</label>
        <textarea id="heroSubtitle" rows="2" placeholder="ספר בקצרה על השירות שלך..."></textarea>
    </div>

    <div class="section">
        <div class="section-header">
            <h2><i class="fas fa-film"></i> תיק עבודות</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn" style="background: #4CAF50; color: white;" onclick="exportPortfolio()">
                    <i class="fas fa-download"></i> גיבוי רשימה
                </button>
                <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importPortfolio(event)">
                <button class="btn" style="background: #2196F3; color: white;" onclick="document.getElementById('importFile').click()">
                    <i class="fas fa-upload"></i> ייבוא גיבוי
                </button>
                <button class="btn" onclick="addPortfolioItemTop()">
                    <i class="fas fa-arrow-up"></i> הוסף להתחלה
                </button>
                <button class="btn" onclick="addPortfolioItemBottom()">
                    <i class="fas fa-arrow-down"></i> הוסף לסוף
                </button>
            </div>
        </div>
        <div id="portfolioContainer"></div>
    </div>

    <div style="text-align: center; margin-bottom: 50px;">
        <button class="btn" onclick="saveAllContent()" style="padding: 15px 50px; font-size: 1.2rem;">
            <i class="fas fa-save"></i> שמור את כל השינויים
        </button>
    </div>
</div>

<div id="toast">✅ השינויים נשמרו בהצלחה!</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
        authDomain: "shnior-studio.firebaseapp.com",
        databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "shnior-studio"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let portfolioItems = [];

    function loadExistingData() {
        db.ref('siteContent').once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById("logoText").value = data.logoText || "";
                document.getElementById("heroTitle").value = data.heroTitle || "";
                document.getElementById("heroSubtitle").value = data.heroSubtitle || "";
                
                if (data.portfolio) {
                    portfolioItems = Object.values(data.portfolio).filter(item => item !== null);
                } else {
                    portfolioItems = [];
                }
                renderPortfolio();
            }
        });
    }

    function renderPortfolio() {
        const container = document.getElementById("portfolioContainer");
        container.innerHTML = "";
        
        portfolioItems.forEach((item, i) => {
            const div = document.createElement("div");
            div.className = "portfolio-item";
            
            const disableUp = i === 0 ? "disabled" : "";
            const disableDown = i === portfolioItems.length - 1 ? "disabled" : "";

            // שכבת המגן: שומרת על המשבצות תקינות גם כשמכניסים קוד HTML ארוך
            const safeTitle = (item.title || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const safeRole = (item.role || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const safeEmbed = (item.youtubeEmbed || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            div.innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; align-items: end;">
                    <div>
                        <label>שם הפרויקט</label>
                        <input type="text" value="${safeTitle}" oninput="updateItem(${i}, 'title', this.value)" placeholder="למשל: קליפ חתונה">
                    </div>
                    <div>
                        <label>תפקיד</label>
                        <input type="text" value="${safeRole}" oninput="updateItem(${i}, 'role', this.value)" placeholder="למשל: עורך ראשי">
                    </div>
                    <div>
                        <label>קוד הטמעה מיוטיוב (iframe)</label>
                        <input type="text" id="yt-input-${i}" value="${safeEmbed}" oninput="updateItem(${i}, 'youtubeEmbed', this.value)" placeholder='<iframe src="...">'>
                    </div>
                </div>
                
                <div class="item-actions">
                    <button class="btn-delete" onclick="deletePortfolioItem(${i})">
                        <i class="fas fa-trash"></i> מחק
                    </button>
                    <button class="btn-move" onclick="moveItemUp(${i})" ${disableUp} title="הזז למעלה">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                    <button class="btn-move" onclick="moveItemDown(${i})" ${disableDown} title="הזז למטה">
                        <i class="fas fa-arrow-down"></i>
                    </button>
                </div>`;
            container.appendChild(div);
        });
    }

    function moveItemUp(index) {
        if (index > 0) {
            const temp = portfolioItems[index];
            portfolioItems[index] = portfolioItems[index - 1];
            portfolioItems[index - 1] = temp;
            renderPortfolio();
        }
    }

    function moveItemDown(index) {
        if (index < portfolioItems.length - 1) {
            const temp = portfolioItems[index];
            portfolioItems[index] = portfolioItems[index + 1];
            portfolioItems[index + 1] = temp;
            renderPortfolio();
        }
    }

    // הפונקציה עודכנה לשמור את הטקסט בדיוק כפי שהוא ללא חיתוכים!
    function updateItem(index, field, value) {
        portfolioItems[index][field] = value;
    }

    function addPortfolioItemTop() {
        portfolioItems.unshift({title: "", role: "", youtubeEmbed: ""});
        renderPortfolio();
    }

    function addPortfolioItemBottom() {
        portfolioItems.push({title: "", role: "", youtubeEmbed: ""});
        renderPortfolio();
    }

    function deletePortfolioItem(i) {
        if(confirm("האם אתה בטוח שברצונך למחוק את הפרויקט הזה?")) {
            portfolioItems.splice(i, 1);
            renderPortfolio();
        }
    }

    function exportPortfolio() {
        if (portfolioItems.length === 0) {
            alert("אין פרויקטים לייצוא.");
            return;
        }
        const dataStr = JSON.stringify(portfolioItems, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.href = url;
        downloadAnchorNode.download = "portfolio_backup.json";
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
        URL.revokeObjectURL(url);
    }

    function importPortfolio(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) {
                    if (confirm("האם אתה בטוח? פעולה זו תחליף את הרשימה שמוצגת כרגע (כדי לשמור סופית בשרת יהיה עליך ללחוץ על 'שמור את כל השינויים').")) {
                        portfolioItems = importedData;
                        renderPortfolio();
                        alert("הנתונים יובאו בהצלחה! אל תשכח ללחוץ על 'שמור את כל השינויים' כדי לעדכן את מסד הנתונים.");
                    }
                } else {
                    alert("שגיאה: הקובץ לא תקין או שאינו מכיל רשימת פרויקטים.");
                }
            } catch (error) {
                alert("שגיאה בקריאת הקובץ. ודא שזהו קובץ גיבוי תקין (JSON).");
            }
        };
        reader.readAsText(file);
        event.target.value = ""; 
    }

    async function saveAllContent() {
        const loader = document.getElementById('loader');
        const fileInput = document.getElementById('logoFile');
        const file = fileInput.files[0];
        
        loader.style.display = "flex";

        try {
            const dataToUpdate = {
                logoText: document.getElementById("logoText").value,
                heroTitle: document.getElementById("heroTitle").value,
                heroSubtitle: document.getElementById("heroSubtitle").value,
                portfolio: portfolioItems
            };

            if (file) {
                if (file.size > 400000) {
                    throw new Error("הקובץ גדול מדי. מקסימום 400KB.");
                }
                const base64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
                dataToUpdate.logoBase64 = base64;
            }

            await db.ref('siteContent').update(dataToUpdate);
            
            showToast();
            if(fileInput) fileInput.value = "";
        } catch (err) {
            alert("שגיאה: " + err.message);
        } finally {
            loader.style.display = "none";
        }
    }

    function showToast() {
        const toast = document.getElementById("toast");
        toast.style.display = "block";
        setTimeout(() => { toast.style.display = "none"; }, 3000);
    }

    window.onload = loadExistingData;
</script>
</body>
</html>
