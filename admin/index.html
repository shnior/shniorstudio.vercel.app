<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול תוכן | Shneior Eisenbach</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #D4AF37;
            --primary-dark: #b8952e;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --input-bg: #2a2a2a;
            --border: #333;
        }

        body { font-family: 'Google Sans', sans-serif; background: var(--bg-dark); color: var(--text-main); padding: 40px 20px; line-height: 1.6; margin: 0; direction: rtl; }
        .container { max-width: 1000px; margin: 0 auto; display: none; /* מוסתר עד להתחברות */ }
        h1 { color: var(--primary); text-align: center; font-size: 2.5rem; margin-bottom: 20px; }

        /* כפתור שמירה עליון */
        .top-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }

        .section { background: var(--card-bg); padding: 30px; border-radius: 16px; margin-bottom: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .section-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .section-header h2 { margin: 0; font-size: 1.5rem; color: var(--primary); }

        label { display: block; margin: 15px 0 8px; font-weight: 500; color: var(--text-muted); font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px 15px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 8px; font-family: inherit; box-sizing: border-box; font-size: 1rem; }
        input:focus, textarea:focus { outline: 1px solid var(--primary); border-color: var(--primary); }
        
        .btn { background: var(--primary); color: #000; padding: 12px 25px; font-size: 1rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; }
        .btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-save-top { box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }

        /* עיצוב התחברות */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 3000; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 100%; max-width: 400px; }
        .login-card i { font-size: 3rem; color: var(--primary); margin-bottom: 20px; }

        /* פריטי פורטפוליו */
        .portfolio-item { border: 1px solid var(--border); padding: 12px 15px; margin: 10px 0; border-radius: 8px; background: #252525; }
        .item-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
        .btn-move { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border); padding: 6px 12px; cursor: pointer; border-radius: 8px; font-size: 0.85rem; }
        .btn-delete { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d; padding: 6px 12px; font-size: 0.85rem; border-radius: 8px; cursor: pointer; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #4CAF50; color: white; padding: 12px 30px; border-radius: 50px; display: none; z-index: 4000; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 5000; }
    </style>
</head>
<body>

<!-- מסך כניסה -->
<div id="loginOverlay">
    <div class="login-card">
        <i class="fas fa-lock"></i>
        <h2 style="color: var(--primary);">כניסת מנהל</h2>
        <p style="color: var(--text-muted);">הזן סיסמה כדי להמשיך</p>
        <input type="password" id="passInput" placeholder="סיסמה..." style="text-align: center; margin-bottom: 20px;">
        <button class="btn" style="width: 100%; justify-content: center;" onclick="checkLogin()">כניסה למערכת</button>
        <p id="loginError" style="color: #ff4d4d; margin-top: 15px; display: none;">סיסמה שגויה, נסה שוב.</p>
    </div>
</div>

<div id="loader" class="loading-overlay">שומר נתונים...</div>

<div class="container" id="mainContainer">
    <div class="top-bar">
        <button class="btn btn-save-top" onclick="saveAllContent()">
            <i class="fas fa-save"></i> שמירה מהירה
        </button>
    </div>

    <h1>🛠 מנהל תוכן מקצועי</h1>

    <!-- מיתוג -->
    <div class="section">
        <div class="section-header">
            <h2><i class="fas fa-id-card"></i> מיתוג ולוגו</h2>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label>טקסט לוגו (השם שלך)</label>
                <input type="text" id="logoText" placeholder="לדוגמה: Shneior Eisenbach">
            </div>
            <div>
                <label>החלפת לוגו (תמונה עד 400KB)</label>
                <input type="file" id="logoFile" accept="image/*">
            </div>
        </div>
    </div>

    <!-- Hero -->
    <div class="section">
        <div class="section-header">
            <h2><i class="fas fa-home"></i> מסך ראשי (Hero)</h2>
        </div>
        <label>כותרת ראשית</label>
        <input type="text" id="heroTitle" placeholder="הסאונד. הוויזואל. ההפקה.">
        <label>תיאור תת-כותרת</label>
        <textarea id="heroSubtitle" rows="2" placeholder="קלידן, מפיק מוזיקלי, עורך וידאו ואנימטור"></textarea>
    </div>

    <!-- תיק עבודות -->
    <div class="section">
        <div class="section-header">
            <h2><i class="fas fa-film"></i> תיק עבודות</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn" style="background: #4CAF50; color: white;" onclick="exportPortfolio()">
                    <i class="fas fa-download"></i> גיבוי
                </button>
                <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importPortfolio(event)">
                <button class="btn" style="background: #2196F3; color: white;" onclick="document.getElementById('importFile').click()">
                    <i class="fas fa-upload"></i> ייבוא
                </button>
                <button class="btn" onclick="addPortfolioItemTop()">
                    <i class="fas fa-arrow-up"></i> הוסף להתחלה
                </button>
            </div>
        </div>
        <div id="portfolioContainer"></div>
        <div style="text-align: center; margin-top: 20px;">
             <button class="btn" onclick="addPortfolioItemBottom()">
                <i class="fas fa-plus"></i> הוסף פרויקט חדש לסוף
            </button>
        </div>
    </div>

    <div style="text-align: center; margin-bottom: 50px;">
        <button class="btn" onclick="saveAllContent()" style="padding: 15px 50px; font-size: 1.2rem;">
            <i class="fas fa-save"></i> שמור את כל השינויים
        </button>
    </div>
</div>

<div id="toast">✅ השינויים נשמרו בהצלחה!</div>

<script>
    // הגדרות אבטחה בסיסיות
    const ADMIN_PASSWORD = "8425"; // שנה את זה לסיסמה שאתה רוצה!

    function checkLogin() {
        const input = document.getElementById('passInput').value;
        const error = document.getElementById('loginError');
        
        if(input === ADMIN_PASSWORD) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            loadExistingData();
        } else {
            error.style.display = 'block';
            document.getElementById('passInput').value = '';
        }
    }

    // מאפשר לחיצה על Enter לכניסה
    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkLogin();
    });

    const firebaseConfig = {
        apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
        authDomain: "shnior-studio.firebaseapp.com",
        databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "shnior-studio"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let portfolioItems = [];

    function loadExistingData() {
        db.ref('siteContent').once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById("logoText").value = data.logoText || "";
                document.getElementById("heroTitle").value = data.heroTitle || "";
                document.getElementById("heroSubtitle").value = data.heroSubtitle || "";
                
                if (data.portfolio) {
                    portfolioItems = Object.values(data.portfolio).filter(item => item !== null);
                } else {
                    portfolioItems = [];
                }
                renderPortfolio();
            }
        });
    }

    function renderPortfolio() {
        const container = document.getElementById("portfolioContainer");
        container.innerHTML = "";
        
        portfolioItems.forEach((item, i) => {
            const div = document.createElement("div");
            div.className = "portfolio-item";
            
            const disableUp = i === 0 ? "disabled" : "";
            const disableDown = i === portfolioItems.length - 1 ? "disabled" : "";

            const safeTitle = (item.title || '').replace(/"/g, '&quot;');
            const safeRole = (item.role || '').replace(/"/g, '&quot;');
            const safeEmbed = (item.youtubeEmbed || '').replace(/"/g, '&quot;');

            div.innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; align-items: end;">
                    <div>
                        <label>שם הפרויקט</label>
                        <input type="text" value="${safeTitle}" oninput="updateItem(${i}, 'title', this.value)">
                    </div>
                    <div>
                        <label>תפקיד</label>
                        <input type="text" value="${safeRole}" oninput="updateItem(${i}, 'role', this.value)">
                    </div>
                    <div>
                        <label>קוד יוטיוב</label>
                        <input type="text" value="${safeEmbed}" oninput="updateItem(${i}, 'youtubeEmbed', this.value)">
                    </div>
                </div>
                <div class="item-actions">
                    <button class="btn-delete" onclick="deletePortfolioItem(${i})"><i class="fas fa-trash"></i> מחק</button>
                    <button class="btn-move" onclick="moveItemUp(${i})" ${disableUp}><i class="fas fa-arrow-up"></i></button>
                    <button class="btn-move" onclick="moveItemDown(${i})" ${disableDown}><i class="fas fa-arrow-down"></i></button>
                </div>`;
            container.appendChild(div);
        });
    }

    function moveItemUp(index) {
        if (index > 0) {
            [portfolioItems[index], portfolioItems[index - 1]] = [portfolioItems[index - 1], portfolioItems[index]];
            renderPortfolio();
        }
    }

    function moveItemDown(index) {
        if (index < portfolioItems.length - 1) {
            [portfolioItems[index], portfolioItems[index + 1]] = [portfolioItems[index + 1], portfolioItems[index]];
            renderPortfolio();
        }
    }

    function updateItem(index, field, value) {
        portfolioItems[index][field] = value;
    }

    function addPortfolioItemTop() {
        portfolioItems.unshift({title: "", role: "", youtubeEmbed: ""});
        renderPortfolio();
    }

    function addPortfolioItemBottom() {
        portfolioItems.push({title: "", role: "", youtubeEmbed: ""});
        renderPortfolio();
    }

    function deletePortfolioItem(i) {
        if(confirm("למחוק פרויקט זה?")) {
            portfolioItems.splice(i, 1);
            renderPortfolio();
        }
    }

    async function saveAllContent() {
        const loader = document.getElementById('loader');
        const fileInput = document.getElementById('logoFile');
        const file = fileInput.files[0];
        loader.style.display = "flex";

        try {
            const dataToUpdate = {
                logoText: document.getElementById("logoText").value,
                heroTitle: document.getElementById("heroTitle").value,
                heroSubtitle: document.getElementById("heroSubtitle").value,
                portfolio: portfolioItems
            };

            if (file) {
                if (file.size > 400000) throw new Error("קובץ גדול מדי (עד 400KB)");
                dataToUpdate.logoBase64 = await new Promise((res, rej) => {
                    const r = new FileReader();
                    r.onload = () => res(r.result);
                    r.readAsDataURL(file);
                });
            }

            await db.ref('siteContent').update(dataToUpdate);
            showToast();
        } catch (err) {
            alert("שגיאה: " + err.message);
        } finally {
            loader.style.display = "none";
        }
    }

    function showToast() {
        const toast = document.getElementById("toast");
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 3000);
    }

    function exportPortfolio() {
        const dataStr = JSON.stringify(portfolioItems, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = "backup.json"; a.click();
    }

    function importPortfolio(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            portfolioItems = JSON.parse(e.target.result);
            renderPortfolio();
        };
        reader.readAsText(event.target.files[0]);
    }
</script>
</body>
</html>
