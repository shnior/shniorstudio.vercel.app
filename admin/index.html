<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מנהל תוכן - שניאור אייזנבך</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: 'Heebo', Arial, sans-serif; background: #0a0507; color: #f4f4f4; padding: 30px; max-width: 1000px; margin: 0 auto; }
    h1 { color: #D4AF37; text-align: center; margin-bottom: 30px; }
    .section { background: #1a0f12; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #7a1528; }
    label { display: block; margin: 12px 0 6px; font-weight: bold; color: #D4AF37; }
    input, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #7a1528; color: white; border-radius: 8px; }
    button { background: #7a1528; color: white; padding: 16px 40px; font-size: 1.2rem; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
    button:hover { background: #D4AF37; color: black; }
    .success { color: #4CAF50; font-weight: bold; }
    .status { text-align: center; margin: 20px 0; font-size: 1.1rem; }
  </style>
</head>
<body>
  <h1>🛠 מנהל תוכן - שניאור אייזנבך</h1>

  <div class="section">
    <h2>לוגו + Hero Section</h2>
    <label>טקסט לוגו</label>
    <input type="text" id="logoText">

    <label>כותרת ראשית (H1)</label>
    <input type="text" id="heroTitle">

    <label>תיאור ראשי (H2)</label>
    <textarea id="heroSubtitle" rows="3"></textarea>

    <label>טקסט כפתור CTA</label>
    <input type="text" id="ctaText" value="להזמנת אירועים והפקות">
  </div>

  <div class="section">
    <h2>שירותים (3 כרטיסים)</h2>
    <label>שירות 1 - כותרת</label>
    <input type="text" id="service1_title">
    <label>שירות 1 - תיאור</label>
    <textarea id="service1_desc" rows="3"></textarea>

    <label>שירות 2 - כותרת</label>
    <input type="text" id="service2_title">
    <label>שירות 2 - תיאור</label>
    <textarea id="service2_desc" rows="3"></textarea>

    <label>שירות 3 - כותרת</label>
    <input type="text" id="service3_title">
    <label>שירות 3 - תיאור</label>
    <textarea id="service3_desc" rows="3"></textarea>
  </div>

  <div class="section">
    <h2>פוטר</h2>
    <label>טקסט ראשי בפוטר</label>
    <textarea id="footerText" rows="3"></textarea>
    
    <label>לינק וואטסאפ (מספר עם 972)</label>
    <input type="text" id="whatsappLink" placeholder="972501234567">
  </div>

  <button onclick="saveAllContent()">💾 שמור את כל השינויים</button>
  <div class="status" id="status"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
      authDomain: "shnior-studio.firebaseapp.com",
      databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shnior-studio",
      storageBucket: "shnior-studio.firebasestorage.app",
      messagingSenderId: "163064507259",
      appId: "1:163064507259:web:3fb46c6795eba5b84f6bde"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // טעינת נתונים
    async function loadContent() {
      const snapshot = await db.ref('siteContent').once('value');
      const data = snapshot.val() || {};

      document.getElementById("logoText").value = data.logoText || "שניאור אייזנבך";
      document.getElementById("heroTitle").value = data.heroTitle || "הסאונד. הוויזואל. ההפקה.";
      document.getElementById("heroSubtitle").value = data.heroSubtitle || "קלידן, מפיק מוזיקלי, עורך וידאו ואנימטור";
      document.getElementById("ctaText").value = data.ctaText || "להזמנת אירועים והפקות";

      // שירותים
      document.getElementById("service1_title").value = data.services?.s1?.title || "לייב על הבמה";
      document.getElementById("service1_desc").value = data.services?.s1?.desc || "";
      document.getElementById("service2_title").value = data.services?.s2?.title || "עריכה והפקות וידאו";
      document.getElementById("service2_desc").value = data.services?.s2?.desc || "";
      document.getElementById("service3_title").value = data.services?.s3?.title || "הנפשה וכלי AI";
      document.getElementById("service3_desc").value = data.services?.s3?.desc || "";

      document.getElementById("footerText").value = data.footerText || "";
      document.getElementById("whatsappLink").value = data.whatsapp || "972000000000";
    }

    // שמירה
    async function saveAllContent() {
      const status = document.getElementById("status");
      status.textContent = "שומר...";

      const data = {
        logoText: document.getElementById("logoText").value,
        heroTitle: document.getElementById("heroTitle").value,
        heroSubtitle: document.getElementById("heroSubtitle").value,
        ctaText: document.getElementById("ctaText").value,

        services: {
          s1: { title: document.getElementById("service1_title").value, desc: document.getElementById("service1_desc").value },
          s2: { title: document.getElementById("service2_title").value, desc: document.getElementById("service2_desc").value },
          s3: { title: document.getElementById("service3_title").value, desc: document.getElementById("service3_desc").value }
        },

        footerText: document.getElementById("footerText").value,
        whatsapp: document.getElementById("whatsappLink").value,
        lastUpdated: Date.now()
      };

      try {
        await db.ref('siteContent').set(data);
        status.innerHTML = '<span class="success">✅ כל השינויים נשמרו בהצלחה!</span>';
      } catch (e) {
        status.innerHTML = `<span style="color:red">שגיאה: ${e.message}</span>`;
      }
    }

    window.onload = loadContent;
  </script>
</body>
</html>
