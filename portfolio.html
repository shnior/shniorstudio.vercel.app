<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">

    <title>תיק עבודות | שניאור אייזנבך</title>
    <!-- כאן נכנס ה-CSS והקישורים הקיימים שלך (העתקתי ממה ששלחת) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    
    <!-- כאן אמור להיות כל ה-CSS שלך מהקובץ המקורי -->
    <style>
        /* (מומלץ להעביר את ה-CSS לקובץ style.css חיצוני כדי למנוע כפילויות) */
        /* הדבק כאן את כל ה-CSS מתוך ה-<style> ב-index.html */
        /* ... הוסף את ה-CSS שלך כאן ... */
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html#home" class="logo">שניאור אייזנבך</a>
            <ul class="nav-links">
                <li><a href="index.html#home">ראשי</a></li>
                <li><a href="index.html#services">שירותים</a></li>
                <li><a href="portfolio.html" class="active">תיק עבודות</a></li>
                <li><a href="index.html#contact">צור קשר</a></li>
            </ul>
        </nav>
    </header>

    <!-- חלק תיק העבודות בלבד -->
    <section id="portfolio" class="section" style="margin-top: 100px;">
        <h2 class="section-title">כל ה<span>פרויקטים</span></h2>
        <div class="portfolio-grid" id="portfolio-grid">
            <!-- התוכן ייטען לכאן דינמית מהפיירבייס -->
        </div>
        <div class="pagination-controls">
            <button id="prev-page" class="page-btn" disabled><i class="fas fa-arrow-right"></i> הקודם</button>
            <span id="page-info" class="page-info">עמוד 1</span>
            <button id="next-page" class="page-btn">הבא <i class="fas fa-arrow-left"></i></button>
        </div>
    </section>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

    <script>
        // הגדרות Firebase זהות למקור
        const firebaseConfig = {
            apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
            authDomain: "shnior-studio.firebaseapp.com",
            databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shnior-studio",
            storageBucket: "shnior-studio.firebasestorage.app",
            messagingSenderId: "163064507259",
            appId: "1:163064507259:web:3fb46c6795eba5b84f6bde"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let fullPortfolioData = [];
        let currentPage = 0;
        const itemsPerPage = 12; // אפשר להגדיל ל-12 בעמוד נפרד

        // פונקציית הרינדור (זהה למקור שלך)
        function renderPortfolioPage() {
            const portfolioGrid = document.getElementById('portfolio-grid');
            portfolioGrid.innerHTML = '';
            const startIdx = currentPage * itemsPerPage;
            const endIdx = startIdx + itemsPerPage;
            const currentItems = fullPortfolioData.slice(startIdx, endIdx);

            currentItems.forEach((item, index) => {
                // לוגיקה של הסרטונים... (תעתיק את הלוגיקה שלך מה-index.html)
                // כאן בחרתי לקצר את הקוד, תוודא שאתה מעתיק את ה-renderPortfolioPage המלא שלך
            });
            // ... עדכון כפתורים ...
        }

        // טעינת נתונים
        db.ref('siteContent/portfolio').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                fullPortfolioData = Array.isArray(data) ? data : Object.values(data);
                renderPortfolioPage();
            }
        });
    </script>
</body>
</html>
