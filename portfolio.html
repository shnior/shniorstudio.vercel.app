<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>תיק עבודות | שניאור אייזנבך</title>
    <meta name="description" content="תיק העבודות הרשמי של שניאור אייזנבך - קלידן, מפיק מוזיקלי, מומחה עריכות והנפשות.">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <style>
        /* === ייבוא גופן תל אביב מקבצים מקומיים === */
        @font-face {
            font-family: 'Tel Aviv';
            src: url('TelAviv-ModernistRegular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'Tel Aviv';
            src: url('TelAviv-ModernistBold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            --bg-dark: #070709;
            --burgundy-deep: #1a0508;
            --burgundy-accent: #7a1528;
            --burgundy-glow: rgba(122, 21, 40, 0.5);
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --gold-solid: #D4AF37;
            --text-light: #f4f4f4;
            --text-muted: #a0a0a5;
            --card-bg: rgba(15, 10, 12, 0.8);
            --border-glow: rgba(212, 175, 55, 0.3);
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Tel Aviv', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            scroll-behavior: smooth;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* =======================================================
           תפריט עליון עם קו זהב
        ======================================================= */
        header {
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(7, 7, 9, 0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(122, 21, 40, 0.2);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 35px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s ease;
            font-weight: 500;
            position: relative;
            padding: 15px 0;
            display: inline-block;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--gold-solid);
            transition: width 0.3s ease;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.8);
        }

        .nav-links a:hover::before,
        .nav-links a.active::before { width: 100%; }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold-solid);
            text-shadow: 0 0 10px var(--burgundy-glow);
        }

        @media (max-width: 768px) {
            nav { padding: 10px 20px; flex-direction: column; gap: 15px; }
        }

        /* =======================================================
           עיצוב כללי
        ======================================================= */
        .section {
            padding: 100px 20px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            min-height: 85vh; /* מבטיח שהתוכן יתפוס מקום גם לפני טעינה */
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 60px;
            font-weight: 700;
            color: var(--text-light);
        }

        .section-title span {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* =======================================================
           תיק עבודות - גריד וכרטיסיות
        ======================================================= */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .portfolio-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .portfolio-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold-solid);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 25px var(--burgundy-glow);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000;
            overflow: hidden;
        }

        .thumbnail-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.7;
            transition: transform 0.6s ease, opacity 0.3s ease;
        }

        .portfolio-card:hover .thumbnail-bg {
            opacity: 1;
            transform: scale(1.05);
        }

        .play-button {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70px; height: 70px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }

        .play-button::after {
            content: ''; display: block;
            border-style: solid;
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent white;
            margin-right: -5px;
        }

        .card-content {
            padding: 25px 20px;
            text-align: right;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-light);
            margin: 0 0 10px 0;
        }

        .card-role {
            font-size: 1rem;
            color: var(--gold-solid);
            margin: 0;
            font-weight: 400;
        }

        .thumbnail-container .plyr {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .plyr__video-wrapper {
            height: 100% !important;
            width: 100% !important;
        }

        /* =======================================================
           פגינציה (דפדוף)
        ======================================================= */
        .pagination-controls {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; margin-top: 50px; padding-bottom: 30px;
        }

        .page-btn {
            background: transparent;
            color: var(--gold-solid);
            border: 1px solid var(--gold-solid);
            padding: 10px 20px;
            font-family: 'Tel Aviv', sans-serif;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex; align-items: center; gap: 10px;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--gold-gradient);
            color: #000;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .page-btn:disabled {
            border-color: #444; color: #555; cursor: not-allowed;
        }

        .page-info {
            font-size: 1.1rem; color: var(--text-muted);
        }

        /* =======================================================
           פס קרדיט תחתון
        ======================================================= */
        .site-credit {
            background-color: #030102; color: var(--text-muted);
            text-align: center; padding: 15px 20px;
            font-size: 0.95rem; letter-spacing: 0.5px;
            position: relative; z-index: 3;
            border-top: 1px solid rgba(212, 175, 55, 0.1); 
        }

        .site-credit span { color: var(--gold-solid); font-weight: 500; }
        .section, .site-credit { position: relative; z-index: 3; }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <img id="headerLogo" src="" alt="לוגו" style="height: 100px; display: none;">
                <span id="headerLogoText" style="font-family: 'Tel Aviv', sans-serif; font-size: 2rem; font-weight: 900; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; vertical-align: middle;">שניאור אייזנבך</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html#home">ראשי</a></li>
                <li><a href="index.html#services">שירותים</a></li>
                <li><a href="portfolio.html" class="active">תיק עבודות</a></li>
                <li><a href="index.html#contact">צור קשר</a></li>
            </ul>
        </nav>
    </header>

    <section id="portfolio" class="section" style="padding-top: 150px;">
        <h2 class="section-title">כל ה<span>פרויקטים</span></h2>
        <div class="portfolio-grid" id="portfolio-grid">
            </div>

        <div class="pagination-controls">
            <button id="prev-page" class="page-btn" disabled><i class="fas fa-arrow-right"></i> הקודם</button>
            <span id="page-info" class="page-info">עמוד 1</span>
            <button id="next-page" class="page-btn">הבא <i class="fas fa-arrow-left"></i></button>
        </div>
    </section>

    <div class="site-credit">
        עיצוב ופיתוח: <span>שניאור אייזנבך</span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script id="free_accessibility_plugin_script" src="https://accessibility.f-static.com/site/free-accessibility-plugin/accessibility.min.js?lan=he&place=bottom-right&distance=20" crossorigin="anonymous"></script>

    <script>
        // ==================== הגדרות Firebase ====================
        const firebaseConfig = {
            apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
            authDomain: "shnior-studio.firebaseapp.com",
            databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shnior-studio",
            storageBucket: "shnior-studio.firebasestorage.app",
            messagingSenderId: "163064507259",
            appId: "1:163064507259:web:3fb46c6795eba5b84f6bde"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // ==================== לוגיקת תיק עבודות ====================
        let allPlayers = [];
        let fullPortfolioData = [];
        let currentPage = 0;
        const itemsPerPage = 12; // מציג 12 סרטונים בעמוד

        function renderPortfolioPage() {
            const portfolioGrid = document.getElementById('portfolio-grid');
            portfolioGrid.innerHTML = ''; 
            allPlayers = []; 

            const startIdx = currentPage * itemsPerPage;
            const endIdx = startIdx + itemsPerPage;
            const currentItems = fullPortfolioData.slice(startIdx, endIdx);

            currentItems.forEach((item, index) => {
                if (!item) return;

                let videoId = "";
                const source = item.youtubeEmbed || "";
                if (source.includes("v=")) videoId = source.split("v=")[1].split("&")[0];
                else if (source.includes("youtu.be/")) videoId = source.split("/").pop().split("?")[0];
                else if (source.includes("embed/")) videoId = source.split("embed/")[1].split(/[? "]/)[0];

                const thumbUrl = videoId ? `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg` : 'https://via.placeholder.com/600x400/111/333?text=Project';

                const card = document.createElement('div');
                card.className = 'portfolio-card';
                card.onclick = function() {
                    if (videoId) {
                        const container = this.querySelector('.thumbnail-container');
                        container.innerHTML = `<div class="plyr__video-embed" id="player-${index}"><iframe src="https://www.youtube.com/embed/${videoId}?origin=${window.location.origin}&iv_load_policy=3&modestbranding=1&playsinline=1&rel=0&enablejsapi=1" allowfullscreen allow="autoplay"></iframe></div>`;
                        
                        const player = new Plyr(`#player-${index}`, {
                            controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                            ratio: '16:9'
                        });
                        allPlayers.push(player);

                        player.on('play', () => {
                            allPlayers.forEach(otherPlayer => {
                                if (otherPlayer !== player) {
                                    otherPlayer.pause();
                                }
                            });
                        });
                        
                        player.play();
                        this.onclick = null;
                    }
                };

                card.innerHTML = `
                    <div class="thumbnail-container">
                        <div class="thumbnail-bg" style="background-image: url('${thumbUrl}');"></div>
                        <div class="play-button"></div>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${item.title || "פרויקט חדש"}</h3>
                        <p class="card-role">${item.role || ""}</p>
                    </div>
                `;
                portfolioGrid.appendChild(card);
            });

            // עדכון כפתורי הדפדוף
            const totalPages = Math.ceil(fullPortfolioData.length / itemsPerPage);
            document.getElementById('page-info').textContent = `עמוד ${currentPage + 1} מתוך ${totalPages || 1}`;
            
            document.getElementById('prev-page').disabled = currentPage === 0;
            document.getElementById('next-page').disabled = currentPage >= totalPages - 1;
        }

        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentPage > 0) {
                currentPage--;
                renderPortfolioPage();
                document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' });
            }
        });

        document.getElementById('next-page').addEventListener('click', () => {
            const totalPages = Math.ceil(fullPortfolioData.length / itemsPerPage);
            if (currentPage < totalPages - 1) {
                currentPage++;
                renderPortfolioPage();
                document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' });
            }
        });

        // ==================== טעינת נתונים (Firebase) ====================
        function loadDynamicContent() {
            db.ref('siteContent').on('value', (snapshot) => {
                const data = snapshot.val();
                
                if (!data) return;

                if (data.logoText) {
                    document.querySelectorAll('#headerLogoText').forEach(el => el.textContent = data.logoText);
                }
                
                const logoImg = document.getElementById('headerLogo');
                if (data.logoBase64) {
                    logoImg.src = data.logoBase64;
                    logoImg.style.display = 'block';
                } else {
                    logoImg.style.display = 'none';
                }

                if (data.portfolio) {
                    fullPortfolioData = Array.isArray(data.portfolio) ? data.portfolio : Object.values(data.portfolio);
                    fullPortfolioData = fullPortfolioData.filter(item => item !== null);
                    currentPage = 0;
                    renderPortfolioPage();
                }
            });
        }

        window.addEventListener('DOMContentLoaded', loadDynamicContent);
    </script>
</body>
</html>
