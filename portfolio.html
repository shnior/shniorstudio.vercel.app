<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <link rel="icon" href="logo.webp" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <style>
        /* === ייבוא גופן תל אביב מקבצים מקומיים === */
        @font-face {
            font-family: 'Tel Aviv';
            src: url('TelAviv-ModernistRegular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'Tel Aviv';
            src: url('TelAviv-ModernistBold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            --bg-dark: #070709;
            --burgundy-deep: #1a0508;
            --burgundy-accent: #7a1528;
            --burgundy-glow: rgba(122, 21, 40, 0.5);
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --gold-solid: #D4AF37;
            --text-light: #f4f4f4;
            --text-muted: #a0a0a5;
            --card-bg: rgba(15, 10, 12, 0.8);
            --border-glow: rgba(212, 175, 55, 0.3);
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Tel Aviv', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            scroll-behavior: smooth;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* =======================================================
           עיצוב מסך הטעינה (Loader)
        ======================================================= */
        #site-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .sound-wave {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            height: 80px;
            margin-bottom: 20px;
        }

        .sound-wave .bar {
            width: 10px;
            height: 20px;
            background: var(--gold-solid);
            border-radius: 5px;
            animation: soundJump 1.2s ease-in-out infinite;
        }

        .sound-wave .bar:nth-child(1) { animation-delay: 0.0s; }
        .sound-wave .bar:nth-child(2) { animation-delay: 0.2s; }
        .sound-wave .bar:nth-child(3) { animation-delay: 0.4s; }
        .sound-wave .bar:nth-child(4) { animation-delay: 0.2s; }
        .sound-wave .bar:nth-child(5) { animation-delay: 0.0s; }

        @keyframes soundJump {
            0%, 100% { height: 15px; background: var(--gold-solid); box-shadow: none; }
            50% { height: 70px; background: #fff; box-shadow: 0 0 15px var(--gold-solid); }
        }

        .loader-text {
            font-size: 1.5rem;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: 1px;
        }

        #site-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* =======================================================
           תפריט עליון עם קו זהב
        ======================================================= */
        header {
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(7, 7, 9, 0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(122, 21, 40, 0.2);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 35px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s ease;
            font-weight: 500;
            position: relative;
            padding: 15px 0;
            display: inline-block;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--gold-solid);
            transition: width 0.3s ease;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.8);
        }

        .nav-links a:hover::before,
        .nav-links a.active::before { width: 100%; }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold-solid);
            text-shadow: 0 0 10px var(--burgundy-glow);
        }

        @media (max-width: 768px) {
            nav { padding: 10px 20px; flex-direction: column; gap: 15px; }
        }

        /* =======================================================
           עיצוב כללי
        ======================================================= */
        .section {
            padding: 100px 20px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 60px;
            font-weight: 700;
            color: var(--text-light);
        }

        .section-title span {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* =======================================================
           תיק עבודות - גריד וכרטיסיות
        ======================================================= */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .portfolio-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .portfolio-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold-solid);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 25px var(--burgundy-glow);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000;
            overflow: hidden;
        }

        .thumbnail-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.7;
            transition: transform 0.6s ease, opacity 0.3s ease;
        }

        .portfolio-card:hover .thumbnail-bg {
            opacity: 1;
            transform: scale(1.05);
        }

        .play-button {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70px; height: 70px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }

        .play-button::after {
            content: ''; display: block;
            border-style: solid;
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent white;
            margin-right: -5px;
        }

        .card-content {
            padding: 25px 20px;
            text-align: right;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-light);
            margin: 0 0 10px 0;
        }

        .card-role {
            font-size: 1rem;
            color: var(--gold-solid);
            margin: 0;
            font-weight: 400;
        }

        .thumbnail-container .plyr {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .plyr__video-wrapper {
            height: 100% !important;
            width: 100% !important;
        }

        /* =======================================================
           פגינציה (דפדוף)
        ======================================================= */
        .pagination-controls {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; margin-top: 50px;
        }

        .page-btn {
            background: transparent;
            color: var(--gold-solid);
            border: 1px solid var(--gold-solid);
            padding: 10px 20px;
            font-family: 'Tel Aviv', sans-serif;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex; align-items: center; gap: 10px;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--gold-gradient);
            color: #000;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .page-btn:disabled {
            border-color: #444; color: #555; cursor: not-allowed;
        }

        .page-info {
            font-size: 1.1rem; color: var(--text-muted);
        }

        /* =======================================================
           Footer
        ======================================================= */
        footer {
            background: linear-gradient(to top, #0a0204, var(--bg-dark));
            padding: 150px 20px;
            text-align: center;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 60vh;
        }

        .footer-logo {
            font-size: 60px;
            font-weight: 900;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 10px rgba(212,175,55,0.3));
        }

        .cta-btn {
            background: transparent;
            color: var(--gold-solid);
            border: 2px solid var(--gold-solid);
            padding: 15px 45px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.4s ease;
            display: inline-block;
        }

        .cta-btn:hover {
            background: linear-gradient(135deg, var(--burgundy-accent), #4a0410);
            color: var(--text-light);
            border-color: var(--gold-solid);
            box-shadow: 0 0 25px var(--burgundy-glow);
            transform: translateY(-3px);
        }

        .footer-cta { font-size: 1.5rem; padding: 20px 60px; }

        .site-credit {
            background-color: #030102; color: var(--text-muted);
            text-align: center; padding: 15px 20px;
            font-size: 0.95rem; letter-spacing: 0.5px;
            position: relative; z-index: 3;
            border-top: 1px solid rgba(212, 175, 55, 0.1); 
        }

        .site-credit span { color: var(--gold-solid); font-weight: 500; }

        #magic-cursor-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 1;
        }

        .section, footer, .site-credit { position: relative; z-index: 3; }
    </style>
</head>

    <script id="free_accessibility_plugin_script" src="https://accessibility.f-static.com/site/free-accessibility-plugin/accessibility.min.js?lan=he&place=bottom-right&distance=20" crossorigin="anonymous"></script>

    <script>
        // ==================== הגדרות Firebase ====================
        const firebaseConfig = {
            apiKey: "AIzaSyA_AHhjzcAYeVoBNEwF5mlzsvUqbnw2maY",
            authDomain: "shnior-studio.firebaseapp.com",
            databaseURL: "https://shnior-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shnior-studio",
            storageBucket: "shnior-studio.firebasestorage.app",
            messagingSenderId: "163064507259",
            appId: "1:163064507259:web:3fb46c6795eba5b84f6bde"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // ==================== לוגיקת תיק עבודות ====================
        let allPlayers = [];
        let fullPortfolioData = [];
        let currentPage = 0;
        const itemsPerPage = 12; // מציג 12 סרטונים בעמוד

        function renderPortfolioPage() {
            const portfolioGrid = document.getElementById('portfolio-grid');
            portfolioGrid.innerHTML = ''; 
            allPlayers = []; 

            const startIdx = currentPage * itemsPerPage;
            const endIdx = startIdx + itemsPerPage;
            const currentItems = fullPortfolioData.slice(startIdx, endIdx);

            currentItems.forEach((item, index) => {
                if (!item) return;

                let videoId = "";
                const source = item.youtubeEmbed || "";
                if (source.includes("v=")) videoId = source.split("v=")[1].split("&")[0];
                else if (source.includes("youtu.be/")) videoId = source.split("/").pop().split("?")[0];
                else if (source.includes("embed/")) videoId = source.split("embed/")[1].split(/[? "]/)[0];

                const thumbUrl = videoId ? `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg` : 'https://via.placeholder.com/600x400/111/333?text=Project';

                const card = document.createElement('div');
                card.className = 'portfolio-card';
                card.onclick = function() {
                    if (videoId) {
                        const container = this.querySelector('.thumbnail-container');
                        container.innerHTML = `<div class="plyr__video-embed" id="player-${index}"><iframe src="https://www.youtube.com/embed/${videoId}?origin=${window.location.origin}&iv_load_policy=3&modestbranding=1&playsinline=1&rel=0&enablejsapi=1" allowfullscreen allow="autoplay"></iframe></div>`;
                        
                        const player = new Plyr(`#player-${index}`, {
                            controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
                            ratio: '16:9'
                        });
                        allPlayers.push(player);

                        player.on('play', () => {
                            allPlayers.forEach(otherPlayer => {
                                if (otherPlayer !== player) {
                                    otherPlayer.pause();
                                }
                            });
                        });
                        
                        player.play();
                        this.onclick = null;
                    }
                };

                card.innerHTML = `
                    <div class="thumbnail-container">
                        <div class="thumbnail-bg" style="background-image: url('${thumbUrl}');"></div>
                        <div class="play-button"></div>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${item.title || "פרויקט חדש"}</h3>
                        <p class="card-role">${item.role || ""}</p>
                    </div>
                `;
                portfolioGrid.appendChild(card);
            });

            // עדכון כפתורי הדפדוף
            const totalPages = Math.ceil(fullPortfolioData.length / itemsPerPage);
            document.getElementById('page-info').textContent = `עמוד ${currentPage + 1} מתוך ${totalPages || 1}`;
            
            document.getElementById('prev-page').disabled = currentPage === 0;
            document.getElementById('next-page').disabled = currentPage >= totalPages - 1;
        }

        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentPage > 0) {
                currentPage--;
                renderPortfolioPage();
                document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' });
            }
        });

        document.getElementById('next-page').addEventListener('click', () => {
            const totalPages = Math.ceil(fullPortfolioData.length / itemsPerPage);
            if (currentPage < totalPages - 1) {
                currentPage++;
                renderPortfolioPage();
                document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' });
            }
        });

        // ==================== טעינת נתונים (Firebase) ====================
        function loadDynamicContent() {
            db.ref('siteContent').on('value', (snapshot) => {
                const data = snapshot.val();
                
                const hideLoader = () => {
                    const loader = document.getElementById('site-loader');
                    if (loader) loader.classList.add('hidden');
                };

                if (!data) {
                    hideLoader();
                    return;
                }

                if (data.logoText) {
                    document.querySelectorAll('#headerLogoText, .footer-logo').forEach(el => el.textContent = data.logoText);
                }
                
                const logoImg = document.getElementById('headerLogo');
                if (data.logoBase64) {
                    logoImg.src = data.logoBase64;
                    logoImg.style.display = 'block';
                } else {
                    logoImg.style.display = 'none';
                }

                if (data.portfolio) {
                    fullPortfolioData = Array.isArray(data.portfolio) ? data.portfolio : Object.values(data.portfolio);
                    fullPortfolioData = fullPortfolioData.filter(item => item !== null);
                    currentPage = 0;
                    renderPortfolioPage();
                }

                hideLoader();
            });
        }

        window.addEventListener('DOMContentLoaded', loadDynamicContent);

        // ==================== אנימציית עכבר (חלקיקים) ====================
        const canvas = document.getElementById('magic-cursor-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particlesArray = [];
        let mouse = { x: null, y: null, lastX: null, lastY: null, vx: 0, vy: 0 };

        window.addEventListener('mousemove', (event) => {
            mouse.lastX = mouse.x || event.x;
            mouse.lastY = mouse.y || event.y;
            mouse.x = event.x;
            mouse.y = event.y;
            mouse.vx = mouse.x - mouse.lastX;
            mouse.vy = mouse.y - mouse.lastY;

            let distance = Math.hypot(mouse.vx, mouse.vy);
            let intensity = Math.min(distance, 100);
            let count = Math.max(1, Math.min(10, Math.floor(distance / 5)));

            for (let i = 0; i < count; i++) {
                let pX = mouse.lastX + (mouse.vx * (i / count));
                let pY = mouse.lastY + (mouse.vy * (i / count));
                
                particlesArray.push(new Particle('glow', pX, pY, mouse.vx, mouse.vy, intensity));
                
                let sparkAmount = Math.max(4, Math.floor(intensity * 0.4));
                for(let j = 0; j < sparkAmount; j++) {
                    particlesArray.push(new Particle('spark', pX, pY, mouse.vx, mouse.vy, intensity));
                }
            }
        });

        class Particle {
            constructor(type, x, y, vx, vy, intensity) {
                this.x = x; this.y = y; this.type = type; this.life = 1.0;
                let throwMultiplier = 1.0;
                
                if (this.type === 'glow') {
                    this.size = Math.random() * 80 + 40;
                    this.speedX = (vx * throwMultiplier * 0.2) + (Math.random() - 0.5) * 2;
                    this.speedY = (vy * throwMultiplier * 0.2) + (Math.random() - 0.5) * 2;
                    this.friction = 0.94;
                    this.lifeDecay = Math.random() * 0.015 + 0.008;
                    const glowColors = ['255, 200, 100', '255, 150, 50', '255, 180, 80'];
                    this.colorRGB = glowColors[Math.floor(Math.random() * glowColors.length)];
                } else if (this.type === 'spark') {
                    this.size = Math.random() * 2.5 + 0.5;
                    let spreadWidth = 6 + (intensity * 0.4);
                    this.speedX = (vx * 0.3) + (Math.random() - 0.5) * spreadWidth;
                    this.speedY = (vy * 0.3) + (Math.random() - 0.5) * spreadWidth;
                    this.friction = 0.96;
                    this.gravity = Math.random() * 0.15 + 0.02;
                    this.lifeDecay = Math.random() * 0.015 + 0.005;
                }
            }

            update() {
                if (this.type === 'spark') this.speedY += this.gravity;
                this.speedX *= this.friction; this.speedY *= this.friction;
                this.x += this.speedX; this.y += this.speedY;
                if (this.type === 'glow') this.size += 1.5;
                else if (this.type === 'spark') this.size *= 0.97;
                this.life -= this.lifeDecay;
            }

            draw() {
                if (this.type === 'glow') {
                    ctx.globalCompositeOperation = 'screen';
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                    ctx.globalAlpha = Math.max(0, this.life);
                    gradient.addColorStop(0, `rgba(${this.colorRGB}, 0.12)`);
                    gradient.addColorStop(1, `rgba(${this.colorRGB}, 0)`);
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                } else if (this.type === 'spark') {
                    ctx.globalCompositeOperation = 'screen';
                    ctx.fillStyle = `rgba(255, 245, 190, ${Math.max(0, this.life)})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function handleParticles() {
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                if (particlesArray[i].life <= 0 || particlesArray[i].size <= 0.2) {
                    particlesArray.splice(i, 1); i--;
                }
            }
        }

        function animateCursor() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            handleParticles();
            requestAnimationFrame(animateCursor);
        }

        animateCursor();
    </script>
</body>
</html>
